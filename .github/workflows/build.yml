name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-script: electron:build:win
            artifact-name: win-package
            artifact-pattern: release/*.exe
          - os: macos-latest
            build-script: electron:build:mac
            artifact-name: mac-package
            artifact-pattern: release/*.dmg
          - os: ubuntu-latest
            build-script: electron:build:linux
            artifact-name: linux-package
            artifact-pattern: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Electron
        run: pnpm run ${{ matrix.build-script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-pattern }}
