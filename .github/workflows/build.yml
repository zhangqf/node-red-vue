name: Build Electron App

on:
  push:
    branches: [release]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-script: electron:build:ci:win
            artifact-name: win-package
            artifact-pattern: release/*.exe
          - os: macos-latest
            build-script: electron:build:ci:mac
            artifact-name: mac-package
            artifact-pattern: release/*.dmg
          - os: ubuntu-latest
            build-script: electron:build:ci:linux
            artifact-name: linux-package
            artifact-pattern: release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build & Publish Electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run ${{ matrix.build-script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-pattern }}
